<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 🎵 Hit-Quiz Retro iOS 🎵 </title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #0d0221; 
            color: #e0e0e0; 
            margin: 0; padding: 0;
            background-image: linear-gradient(180deg, #0d0221 0%, #0f0c29 100%); 
            min-height: 100vh;
        }

        .card { 
            background: rgba(20, 20, 35, 0.9); 
            border-radius: 20px; padding: 20px; margin: 10px auto; 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); 
            border: 1px solid rgba(0, 212, 255, 0.3); max-width: 90%; 
        }

        /* Neon Buttons */
        button { 
            background: #000; border: 2px solid #ff0055; color: #ff0055; 
            padding: 12px 24px; border-radius: 12px; cursor: pointer; 
            font-size: 0.9em; margin: 5px; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 8px #ff0055; text-shadow: 0 0 5px #ff0055;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); opacity: 0.8; }

        .btn-plus { border-color: #bcff00; color: #bcff00; box-shadow: 0 0 10px #bcff00; text-shadow: 0 0 5px #bcff00; }
        .btn-minus { border-color: #555; color: #888; box-shadow: none; text-shadow: none; }
        .btn-secondary { border-color: #00d4ff; color: #00d4ff; box-shadow: 0 0 10px #00d4ff; text-shadow: 0 0 5px #00d4ff; }
        .btn-admin { border-color: #444; color: #fff; width: 250px; display: block; margin: 10px auto; box-shadow: none; text-shadow: none; font-size: 0.75em; }

        /* Video Circle */
        #video-wrapper {
            width: 130px; height: 130px; margin: 15px auto;
            border-radius: 50%; border: 4px solid #00d4ff;
            overflow: hidden; position: relative; background: #000;
            box-shadow: 0 0 20px #00d4ff;
        }

        #video-player {
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%) scale(1.5); 
            width: 100%; height: 100%;
        }

        /* Scoreboard Retro */
        #sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13, 2, 33, 0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid #00d4ff;
        }

        .scoreboard { display: flex; overflow-x: auto; justify-content: center; gap: 10px; padding: 10px; }
        .player-score { 
            background: #000; padding: 12px; border-radius: 15px; 
            min-width: 140px; border: 2px solid #00d4ff; 
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .score-val { 
            font-family: 'Courier New', monospace; font-size: 2.2em; 
            color: #bcff00; text-shadow: 0 0 10px #bcff00; display: block; 
        }

        .won-songs-list {
            font-family: 'Courier New', monospace; font-size: 0.65em;
            color: #00d4ff; text-align: left; max-height: 70px;
            overflow-y: auto; margin: 8px 0; border-top: 1px solid #333; padding-top: 5px;
        }

        .hidden { display: none; }
        input, select { background: #1a1a2e; border: 1px solid #00d4ff; color: white; padding: 10px; border-radius: 10px; margin: 5px; }
    </style>
</head>
<body>

    <div id="setup-area" class="card">
        <h2 style="color:#00d4ff; text-shadow: 0 0 10px #00d4ff;">🕹️ RETRO QUIZ SETUP</h2>
        <select id="category-dropdown" onchange="updateBoxDropdown()"></select>
        <select id="box-dropdown"></select>
        
        <div id="player-selection" style="margin-top: 15px;">
            <p>Spieler wählen:</p>
            <button onclick="createPlayerInputs(2)">2 Spieler</button>
            <button onclick="createPlayerInputs(3)">3 Spieler</button>
            <button onclick="createPlayerInputs(4)">4 Spieler</button>
        </div>

        <div id="name-inputs" style="margin-top: 15px;"></div>
        <button id="start-game-btn" class="hidden" onclick="startGame()" style="background:#bcff00; color:#000; border-color:#bcff00; box-shadow: 0 0 15px #bcff00;">START 🚀</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="sticky-header">
            <div id="scoreboard" class="scoreboard"></div>
        </div>

        <div class="card">
            <h2 id="status" style="color:#ff0055;">Bereit?</h2>
            <div id="video-wrapper">
                <iframe id="video-player" src="" frameborder="0" allow="autoplay; encrypted-media; playsinline"></iframe>
            </div>
            <button onclick="pickRandomSong()" class="btn-plus" style="width: 80%;">🎲 NÄCHSTER SONG</button>
            
            <div id="controls" class="hidden">
                <button onclick="stopVideo()">⏹️ STOP</button>
                <button onclick="revealInfo()" class="btn-secondary">👁️ LÖSUNG</button>
            </div>

            <div id="song-info" class="hidden">
                <h3 id="display-title" style="color: #bcff00; margin-bottom: 5px;"></h3>
                <p id="display-year" style="font-family: 'Courier New', monospace; font-weight: bold;"></p>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <p id="db-count" style="font-size: 0.7em; color: #666;"></p>
            <button onclick="backToMenu()" class="btn-admin" style="border-color:#00d4ff; color:#00d4ff;">📂 BOX WECHSELN</button>
            <button onclick="resetPointsOnly()" class="btn-admin">🔄 PUNKTE RESET</button>
            <button onclick="hardReset()" class="btn-admin" style="border-color:#cc0000; color:#cc0000; opacity:0.5;">💀 ALLES LÖSCHEN</button>
        </div>
    </div>

<script>
    const quizDaten = {
        "Vinyl-Singles": {
            "Vinyl-Box 1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQjElFG26lRR_AjCpZIyBsmXT7TlOKmoIY99hPKrogCwvnVHGlThxIAe-K8ILOznkhUd_NUabzIe8qu/pub?output=csv",
            "Vinyl-Box 2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQaZ55kvandOLvE3JBbaxbh4ZnUsCi4z7lK0K7tC7fx5oUaIxEeTvyfKYagAB7YlA4mSvoZREneXu7N/pub?output=csv",
            "Vinyl-Box 3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWX-VXG6A0DFUdb3E0H7pjoSBd1vgfgo_5llOFqTeva94utZp2xBvXHq4fcpdAcSZbd0eNyyBWpXk2/pub?output=csv",
            "Vinyl-Box 4": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5RUFy3AdZ3-g-iq64XeddZZxFjNmbsBG76ocLh1h09BdzHEvAJIsFIrEa5ZdygvHiZEbfp-Q5Q9SM/pub?output=csv"
        },
        "Best Of": { 
            "Best Of-Box 1": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHd-qS-Q6FSE6vrcAsQpAc6vVT8AdkZ8OK6oMc2IoBhA_mmHm-wW8e_OnIB2cQy0m-o7oVxWQuBlbR/pub?output=csv", 
            "Best Of-Box 2": "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVmcUtONEcIOdXien4FozsQJ5zxyzphm2J6_jguaUFyRLqI3m7WYyj6hAewzbhSxPvjRbzjwPmkGev/pub?output=csv",
            "Best Of-Box 3": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBty0OccPS1PxuHf6L4dDQEbIULHrKe9HtNBJTXshR2R5Kvu1hgVWXvNiPajCFwLR8lkJfENAq-3xH/pub?output=csv"
        },
        "Mixe": { "Party 1": "DEIN_LINK_HIER" }
    };

    let songDatenbank = [];
    let players = [];
    let currentSong = null;
    let lastRevealedId = null;
    let playedSongIds = JSON.parse(localStorage.getItem('hitster_played_songs')) || [];

    function bootQuiz() {
        const catDrop = document.getElementById('category-dropdown');
        catDrop.innerHTML = "";
        for (let kat in quizDaten) {
            let opt = document.createElement('option');
            opt.value = kat; opt.textContent = kat; catDrop.appendChild(opt);
        }
        updateBoxDropdown();
    }

    function updateBoxDropdown() {
        const catDrop = document.getElementById('category-dropdown');
        const boxDrop = document.getElementById('box-dropdown');
        boxDrop.innerHTML = "";
        for (let box in quizDaten[catDrop.value]) {
            let opt = document.createElement('option');
            opt.value = quizDaten[catDrop.value][box]; opt.textContent = box; boxDrop.appendChild(opt);
        }
    }

    function createPlayerInputs(num) {
        players = [];
        const div = document.getElementById('name-inputs');
        div.innerHTML = "";
        for(let i=1; i<=num; i++) {
            div.innerHTML += `<input type="text" id="p${i}" placeholder="Name ${i}" style="display:block; margin: 10px auto; width: 80%;">`;
        }
        document.getElementById('start-game-btn').classList.remove('hidden');
    }

    async function startGame() {
        const url = document.getElementById('box-dropdown').value;
        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split(/\r?\n/).slice(1);
            songDatenbank = rows.map(row => {
                const col = row.split(row.includes(';') ? ';' : ',');
                return { ytId: col[0]?.trim(), titel: col[1]?.trim(), interpret: col[2]?.trim(), jahr: col[3]?.trim() };
            }).filter(s => s.ytId);

            if (players.length === 0) {
                const inps = document.querySelectorAll('#name-inputs input');
                players = Array.from(inps).map(inp => ({ name: inp.value || "Spieler", score: 0, wonSongs: [] }));
            }
            
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            updateDbCounter();
            renderScoreboard();
        } catch(e) { alert("Ladefehler!"); }
    }

    function updateDbCounter() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        document.getElementById('db-count').innerText = `Pool: ${pool.length} | Total gespielt: ${playedSongIds.length}`;
    }

    function renderScoreboard() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = players.map((p, i) => `
            <div class="player-score">
                <strong style="color:#00d4ff;">${p.name}</strong>
                <span class="score-val">${p.score}</span>
                <div class="won-songs-list">
                    ${p.wonSongs && p.wonSongs.length > 0 ? p.wonSongs.map(s => `<div>> ${s}</div>`).join('') : '---'}
                </div>
                <button class="btn-plus" onclick="updateScore(${i}, 1)">+1</button>
                <button class="btn-minus" onclick="updateScore(${i}, -1)">-1</button>
            </div>
        `).join("");
    }

    function updateScore(idx, change) {
        if (change === 1 && currentSong) {
            players[idx].score += 1;
            if (!players[idx].wonSongs) players[idx].wonSongs = [];
            players[idx].wonSongs.push(`${currentSong.jahr}: ${currentSong.titel}`);
            lastRevealedId = currentSong.ytId;
        } else if (change === -1) {
            players[idx].score = Math.max(0, players[idx].score - 1);
            if (players[idx].wonSongs?.length > 0) players[idx].wonSongs.pop();
            if (lastRevealedId) {
                playedSongIds = playedSongIds.filter(id => id !== lastRevealedId);
                localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
                lastRevealedId = null;
                updateDbCounter();
            }
        }
        renderScoreboard();
        if(players[idx].score === 10) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('status').innerText = `🏆 ${players[idx].name} WIN! 🏆`;
        }
    }

    function pickRandomSong() {
        const pool = songDatenbank.filter(s => !playedSongIds.includes(s.ytId));
        if(pool.length === 0) return alert("Box leer!");
        currentSong = pool[Math.floor(Math.random() * pool.length)];
        lastRevealedId = null;
        document.getElementById('status').innerText = "LISTEN...";
        document.getElementById('video-player').src = `https://www.youtube.com/embed/${currentSong.ytId}?playsinline=1&autoplay=1&modestbranding=1`;
        document.getElementById('controls').classList.remove('hidden');
        document.getElementById('song-info').classList.add('hidden');
    }

    function stopVideo() { document.getElementById('video-player').src = ""; }

    function revealInfo() {
        stopVideo();
        document.getElementById('song-info').classList.remove('hidden');
        document.getElementById('display-title').innerText = `${currentSong.titel} - ${currentSong.interpret}`;
        document.getElementById('display-year').innerText = `YEAR: ${currentSong.jahr}`;
        if(!playedSongIds.includes(currentSong.ytId)) {
            playedSongIds.push(currentSong.ytId);
            lastRevealedId = currentSong.ytId;
            localStorage.setItem('hitster_played_songs', JSON.stringify(playedSongIds));
            updateDbCounter();
        }
    }

    function resetPointsOnly() {
        if(confirm("Punkte auf 0?")) {
            players.forEach(p => { p.score = 0; p.wonSongs = []; });
            renderScoreboard();
        }
    }

    function backToMenu() {
        if(confirm("Box wechseln? Punkte bleiben!")) {
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('setup-area').classList.remove('hidden');
            document.getElementById('player-selection').classList.add('hidden');
            document.getElementById('name-inputs').innerHTML = "<p style='color:#bcff00;'>READY FOR NEXT BOX</p>";
            stopVideo();
        }
    }

    function hardReset() {
        if(confirm("ALLES LÖSCHEN?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = bootQuiz;
</script>
</body>
</html>
